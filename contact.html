<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Animated Hello World</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at 22% 20%, #ff6f61 0 11%, transparent 28%),
        radial-gradient(circle at 78% 32%, #27c3ff 0 10%, transparent 25%),
        linear-gradient(135deg, #16181f, #232a3b 45%, #111318);
    }

    .nav {
      position: fixed;
      top: 24px;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(10, 12, 18, 0.58);
      backdrop-filter: blur(14px);
      transform: translateX(-50%);
      animation: navDrop 0.8s ease-out both;
    }

    .nav a {
      color: #ffffff;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .nav a:hover,
    .nav a.active {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .content {
      width: min(88vw, 760px);
      padding: 96px 0 40px;
      text-align: center;
      animation: rise 1s ease-out both;
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      animation: glow 2.6s ease-in-out infinite;
    }

    .contact-box {
      display: inline-grid;
      gap: 12px;
      min-width: min(100%, 390px);
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(10, 12, 18, 0.42);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.25);
    }

    .contact-box a,
    .contact-box span {
      display: block;
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-size: 1.08rem;
      line-height: 1.5;
    }

    .contact-box a:hover {
      color: #ffd166;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      0%,
      100% {
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.25));
      }

      50% {
        filter: drop-shadow(0 0 24px rgba(255, 209, 102, 0.75));
      }
    }

    @keyframes navDrop {
      from {
        opacity: 0;
        transform: translate(-50%, -18px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="Main navigation">
    <a href="hello-world.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="blank.html">LOL</a>
  </nav>

  <main class="content">
    <h1>Contact Us</h1>
    <section class="contact-box" aria-label="Contact details">
      <a href="mailto:hello@example.com">hello@example.com</a>
      <span>+1 555 010 2026</span>
      <span>Open Monday to Friday</span>
    </section>
  </main>
</body>
</html>
