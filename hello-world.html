<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hello World</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at 20% 20%, #ff6f61 0 12%, transparent 28%),
        radial-gradient(circle at 80% 30%, #27c3ff 0 10%, transparent 25%),
        linear-gradient(135deg, #16181f, #232a3b 45%, #111318);
    }

    .nav {
      position: fixed;
      top: 24px;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(10, 12, 18, 0.58);
      backdrop-filter: blur(14px);
      transform: translateX(-50%);
      animation: navDrop 0.8s ease-out both;
    }

    .nav a {
      color: #ffffff;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .nav a:hover,
    .nav a.active {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }

    .scene {
      position: relative;
      width: min(90vw, 760px);
      min-height: 320px;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .ring {
      position: absolute;
      width: 280px;
      aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      animation: spin 12s linear infinite;
    }

    .ring::before,
    .ring::after {
      content: "";
      position: absolute;
      width: 18px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 22px rgba(255, 255, 255, 0.8);
    }

    .ring::before {
      top: -9px;
      left: calc(50% - 9px);
    }

    .ring::after {
      right: 22px;
      bottom: 22px;
      background: #ffd166;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.5rem, 13vw, 8.5rem);
      line-height: 0.95;
      text-align: center;
      letter-spacing: 0;
      text-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      animation: floatIn 1.4s ease-out both, glow 2.6s ease-in-out infinite;
    }

    .spark {
      position: absolute;
      width: 10px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #a8ffcb;
      opacity: 0;
      animation: sparkle 3s ease-in-out infinite;
    }

    .spark:nth-child(2) {
      top: 18%;
      left: 14%;
      animation-delay: 0.2s;
    }

    .spark:nth-child(3) {
      right: 12%;
      top: 26%;
      background: #ffdf7e;
      animation-delay: 0.8s;
    }

    .spark:nth-child(4) {
      left: 26%;
      bottom: 18%;
      background: #9fd3ff;
      animation-delay: 1.4s;
    }

    .spark:nth-child(5) {
      right: 22%;
      bottom: 14%;
      background: #ff9ad5;
      animation-delay: 2s;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(36px) scale(0.92);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes glow {
      0%,
      100% {
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.25));
      }

      50% {
        filter: drop-shadow(0 0 24px rgba(255, 209, 102, 0.75));
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes sparkle {
      0%,
      100% {
        opacity: 0;
        transform: scale(0.2) translateY(12px);
      }

      45%,
      60% {
        opacity: 1;
        transform: scale(1.2) translateY(-10px);
      }
    }

    @keyframes navDrop {
      from {
        opacity: 0;
        transform: translate(-50%, -18px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="Main navigation">
    <a href="hello-world.html" class="active">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="blank.html">LOL</a>
  </nav>

  <main class="scene" aria-label="Animated hello world">
    <div class="ring" aria-hidden="true"></div>
    <span class="spark" aria-hidden="true"></span>
    <span class="spark" aria-hidden="true"></span>
    <span class="spark" aria-hidden="true"></span>
    <span class="spark" aria-hidden="true"></span>
    <h1>Hello World</h1>
  </main>
</body>
</html>
